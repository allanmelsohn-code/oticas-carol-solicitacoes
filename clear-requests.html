<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpar Solicitações - Óticas Carol</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
        }
        .warning {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
            color: #92400e;
        }
        .warning strong {
            display: block;
            margin-bottom: 5px;
            font-size: 16px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #b91c1c;
        }
        button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .success {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .error {
            background: #fee2e2;
            border: 1px solid #ef4444;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
        }
        label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🗑️ Limpar Base de Dados</h1>
        <p style="color: #6b7280; margin-bottom: 20px;">Sistema Óticas Carol - Preparação para Produção</p>
        
        <div class="warning">
            <strong>⚠️ ATENÇÃO!</strong>
            Esta ação irá DELETAR PERMANENTEMENTE todas as solicitações e aprovações do sistema.
            Use apenas para preparar o sistema para produção.
        </div>

        <form id="clearForm">
            <label for="email">Email do Aprovador:</label>
            <input type="text" id="email" placeholder="admin@oticascarol.com.br" required>
            
            <label for="password">Senha:</label>
            <input type="password" id="password" placeholder="Digite sua senha" required>
            
            <label for="confirmation">Digite "LIMPAR" para confirmar:</label>
            <input type="text" id="confirmation" placeholder="LIMPAR" required>
            
            <button type="submit" id="clearBtn">🗑️ Limpar Todas as Solicitações</button>
        </form>

        <div id="result"></div>
    </div>

    <script type="module">
        const API_BASE = 'https://vbqatwxsawkiilmsjvcn.supabase.co/functions/v1/make-server-b2c42f95';
        const PUBLIC_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZicWF0d3hzYXdraWlsbXNqdmNuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc0NzYyNDQsImV4cCI6MjA1MzA1MjI0NH0.iG9xqTcK3AoSAQmK3KZZ8OIEGnMl1NzHVsHTpHvz9nE';

        document.getElementById('clearForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmation = document.getElementById('confirmation').value;
            const resultDiv = document.getElementById('result');
            const clearBtn = document.getElementById('clearBtn');

            // Validar confirmação
            if (confirmation !== 'LIMPAR') {
                resultDiv.innerHTML = '<div class="error">❌ Você precisa digitar "LIMPAR" para confirmar.</div>';
                return;
            }

            clearBtn.disabled = true;
            clearBtn.textContent = 'Processando...';
            resultDiv.innerHTML = '';

            try {
                // 1. Fazer login
                console.log('🔐 Fazendo login...');
                const loginResponse = await fetch(`${API_BASE}/signin`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${PUBLIC_ANON_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (!loginResponse.ok) {
                    const errorData = await loginResponse.json();
                    throw new Error(errorData.error || 'Erro ao fazer login');
                }

                const { sessionId, user } = await loginResponse.json();
                console.log('✅ Login bem-sucedido:', user.email);

                // Verificar se é aprovador
                if (user.role !== 'approver') {
                    throw new Error('Apenas aprovadores podem executar esta ação');
                }

                // 2. Limpar solicitações
                console.log('🗑️ Limpando solicitações...');
                const clearResponse = await fetch(`${API_BASE}/admin/clear-requests`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${PUBLIC_ANON_KEY}`,
                        'X-Session-ID': sessionId
                    }
                });

                if (!clearResponse.ok) {
                    const errorData = await clearResponse.json();
                    throw new Error(errorData.error || 'Erro ao limpar dados');
                }

                const result = await clearResponse.json();
                console.log('✅ Dados limpos:', result);

                resultDiv.innerHTML = `
                    <div class="success">
                        <strong>✅ Sucesso!</strong><br>
                        ${result.message}<br><br>
                        <strong>Detalhes:</strong><br>
                        • Solicitações deletadas: ${result.requestsDeleted}<br>
                        • Aprovações deletadas: ${result.approvalsDeleted}
                    </div>
                `;

                // Limpar formulário
                document.getElementById('clearForm').reset();

            } catch (error) {
                console.error('❌ Erro:', error);
                resultDiv.innerHTML = `<div class="error"><strong>❌ Erro:</strong><br>${error.message}</div>`;
            } finally {
                clearBtn.disabled = false;
                clearBtn.textContent = '🗑️ Limpar Todas as Solicitações';
            }
        });
    </script>
</body>
</html>
